name: Build Desktop App

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:  # Allow manual trigger

permissions:
  contents: write  # Required for creating releases

jobs:
  build:
    runs-on: ${{ matrix.os }}
    
    strategy:
      matrix:
        os: [windows-latest, macos-latest]
      fail-fast: false  # Continue building even if one fails
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
      
      - name: Get yarn cache directory
        id: yarn-cache-dir
        run: echo "dir=$(yarn cache dir)" >> $GITHUB_OUTPUT
        shell: bash
      
      - name: Cache yarn dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.yarn-cache-dir.outputs.dir }}
          key: ${{ runner.os }}-yarn-${{ hashFiles('**/yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-yarn-
      
      - name: Install frontend dependencies
        run: |
          cd frontend
          yarn install
      
      - name: Build frontend
        run: |
          cd frontend
          yarn build
      
      - name: Copy frontend build to desktop (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p desktop/frontend-build
          cp -r frontend/build/* desktop/frontend-build/
      
      - name: Copy frontend build to desktop (Windows)
        if: runner.os == 'Windows'
        run: |
          if not exist desktop\\frontend-build mkdir desktop\\frontend-build
          xcopy /E /I /Y frontend\\build\\* desktop\\frontend-build\\
        shell: cmd
      
      - name: Install desktop dependencies
        run: |
          cd desktop
          yarn install
      
      - name: Build desktop app (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          cd desktop
          yarn build:win --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Build desktop app (Mac)
        if: matrix.os == 'macos-latest'
        run: |
          cd desktop
          yarn build:mac --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false  # Disable code signing for now
      
      - name: Upload Windows artifacts
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: desktop/dist/*.exe
          if-no-files-found: error
          retention-days: 7
      
      - name: Upload Mac artifacts
        if: matrix.os == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: mac-installer
          path: desktop/dist/*.dmg
          if-no-files-found: error
          retention-days: 7
  
  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    
    steps:
      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-installer
          path: ./dist
      
      - name: Download Mac artifacts
        uses: actions/download-artifact@v4
        with:
          name: mac-installer
          path: ./dist
      
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: ./dist/*
          draft: true
          generate_release_notes: true
          body: |
            ## Tally Accounting Software - Desktop Release
            
            ### Downloads
            - **Windows**: Tally-Accounting-Setup-*.exe
            - **Mac**: Tally-Accounting-*.dmg
            
            ### Installation
            - Windows: Run the .exe installer
            - Mac: Open the .dmg and drag to Applications folder
            
            ### Features
            - Complete accounting system
            - Staff & Payroll management
            - Attendance tracking
            - Salary payment with auto voucher
            - All reports (Trial Balance, P&L, Balance Sheet, etc.)
            
            ### Auto-Update
            The app will automatically check for updates and notify you.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
